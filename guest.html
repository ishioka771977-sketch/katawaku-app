<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲストアクセス — 型知</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/config.js"></script>
<script src="/auth.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'BIZ UDPGothic', 'Meiryo', sans-serif;
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  padding: 32px;
  max-width: 400px;
  width: 100%;
}
h1 { font-size: 20px; color: #1a5276; text-align: center; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #888; text-align: center; margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  margin-bottom: 14px;
}
.btn {
  width: 100%;
  padding: 14px;
  background: #1a5276;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
.btn:disabled { opacity: 0.5; }
.error { background: #fee; color: #c0392b; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 8px; }
.success { background: #efe; color: #27ae60; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
  <div class="card">
    <h1>ゲストアクセス</h1>
    <p class="subtitle">石岡組アプリへの一時アクセスを受け取ります</p>

    <label>この機器の名前</label>
    <input type="text" id="deviceLabel">

    <button class="btn" id="btn" onclick="go()">この機器でアクセスを開始</button>
    <div id="error" class="error" style="display:none"></div>
    <div id="success" class="success" style="display:none"></div>
  </div>

<script>
const qs = new URLSearchParams(window.location.search);
const token = qs.get('token');

// 機器名デフォルト
const ua = navigator.userAgent;
let defaultLabel = 'ゲスト機器';
if (/iPhone/.test(ua)) defaultLabel = 'iPhone (ゲスト)';
else if (/iPad/.test(ua)) defaultLabel = 'iPad (ゲスト)';
else if (/Android/.test(ua)) defaultLabel = 'Android (ゲスト)';
else if (/Mac/.test(ua)) defaultLabel = 'Mac (ゲスト)';
else if (/Windows/.test(ua)) defaultLabel = 'Windows PC (ゲスト)';
document.getElementById('deviceLabel').value = defaultLabel;

if (!token) {
  document.querySelector('.card').innerHTML = '<h1>トークンが指定されていません</h1><p class="subtitle">管理者から配布されたゲストアクセスURLから開いてください。</p>';
}

async function go() {
  const btn = document.getElementById('btn');
  const errEl = document.getElementById('error');
  const okEl = document.getElementById('success');
  errEl.style.display = 'none';
  okEl.style.display = 'none';
  btn.disabled = true;

  const result = await window.authGuestAccess(token, document.getElementById('deviceLabel').value);
  if (result.error) {
    errEl.textContent = result.error;
    errEl.style.display = '';
    btn.disabled = false;
  } else {
    okEl.textContent = `ゲスト「${result.guest.label}」として登録成功`;
    okEl.style.display = '';
    setTimeout(() => { window.location.replace('/'); }, 1500);
  }
}
</script>
</body>
</html>
