<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>型知 admin — 工事マスタ管理 (v2.0 スタブ)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/config.js"></script>
<script src="/auth.js"></script>
<script>(async () => { await authGuard(); })();</script>
<script src="/project-master.js"></script>
<script src="/setup-md.js"></script>
<script src="/index-builder.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'BIZ UDPGothic','Meiryo',sans-serif;background:#f5f5f5;color:#333;font-size:14px;padding:20px}
h1{font-size:18px;color:#1a5276;margin-bottom:6px}
.subtitle{font-size:12px;color:#666;margin-bottom:18px}
.stub-banner{background:#fff8e1;border-left:4px solid #f39c12;padding:10px 14px;margin-bottom:14px;font-size:12px}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
th,td{border:1px solid #e0e0e0;padding:8px;text-align:left;vertical-align:top}
th{background:#f0f4f8;font-weight:bold;color:#1a5276}
.status-pill{display:inline-block;padding:1px 8px;border-radius:8px;font-size:10px;font-weight:bold}
.s-in_progress{background:#e8f0fe;color:#1a5276}
.s-completed_pool{background:#fff8e1;color:#e67e22}
.s-integrated{background:#dff5e8;color:#27ae60}
input,select,textarea{font:inherit;padding:4px 6px;border:1px solid #ccc;border-radius:3px;width:100%}
.btn{display:inline-block;padding:5px 10px;border:none;border-radius:3px;cursor:pointer;font-size:11px;font-weight:bold;margin-right:4px}
.btn-primary{background:#1a5276;color:#fff}
.btn-success{background:#27ae60;color:#fff}
.btn-warning{background:#f39c12;color:#fff}
.legacy-input{font-family:Consolas,monospace;font-size:11px;width:100%;height:60px}
.empty{text-align:center;padding:40px;color:#999;font-size:13px}
.toolbar{margin-bottom:12px;display:flex;gap:8px;align-items:center}
</style>
</head>
<body>

<h1>型知 admin — 工事マスタ管理</h1>
<div class="subtitle">v2.0 最小スタブ画面 — project_master の閲覧と legacy_slugs の編集</div>

<div class="stub-banner">
  <b>このページは v2.0 の最小スタブ実装です。</b>
  実データ0件のため、本格的なマッピング作業は発生しない想定。今後旧形式ファイルが発生した場合に備えた最低限の機能のみ提供しています。
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="loadAll()">🔄 再読込</button>
  <button class="btn btn-success" onclick="rebuildIndexes()">🗂️ INDEX 再生成</button>
  <button class="btn btn-warning" onclick="openInventoryExport()">📤 棚卸しエクスポート</button>
  <button class="btn" style="background:#3498db;color:#fff" onclick="openSetupMdUpdate()">📋 セットアップmd更新</button>
  <span id="globalStatus" style="font-size:12px;color:#666;margin-left:10px"></span>
</div>

<!-- 棚卸しエクスポート モーダル -->
<div id="invModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:8px;padding:20px;max-width:780px;width:94%;max-height:92vh;overflow:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:8px">
      <h3 style="font-size:15px;color:#f39c12">📤 棚卸しエクスポート</h3>
      <button class="btn" style="background:#ccc" onclick="document.getElementById('invModal').style.display='none'">✕ 閉じる</button>
    </div>
    <p style="font-size:12px;color:#666;margin-bottom:8px">
      対象（チェック済工事の最終版JSON + 知見サマリーをmdで出力）
    </p>
    <div id="invList" style="max-height:300px;overflow:auto;border:1px solid #eee;padding:8px;font-size:12px"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px">
      <button class="btn btn-success" onclick="doInventoryExport()">Markdownでダウンロード</button>
    </div>
  </div>
</div>

<!-- セットアップmd更新 モーダル -->
<div id="smuModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:8px;padding:20px;max-width:780px;width:94%;max-height:92vh;overflow:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:8px">
      <h3 style="font-size:15px;color:#3498db">📋 セットアップmd更新</h3>
      <button class="btn" style="background:#ccc" onclick="document.getElementById('smuModal').style.display='none'">✕ 閉じる</button>
    </div>
    <div style="display:grid;gap:8px">
      <label style="font-size:12px;color:#666">対象アプリ</label>
      <select id="smuApp" style="font-size:13px;padding:5px 8px;border:1px solid #ccc;border-radius:3px">
        <option value="katachi">katachi（型知）</option>
        <option value="tetchi">tetchi（鉄知）</option>
      </select>

      <label style="font-size:12px;color:#666">新版md本文（中央くろたんで完成させたもの）</label>
      <textarea id="smuContent" style="font-family:Consolas,monospace;font-size:11px;height:240px;border:1px solid #ccc;border-radius:3px;padding:8px" placeholder="貼り付け..."></textarea>

      <label style="font-size:12px;color:#666">変更サマリー（NEWバッジで表示される）</label>
      <textarea id="smuSummary" style="font-size:12px;height:60px;border:1px solid #ccc;border-radius:3px;padding:8px" placeholder="・擁壁の勾配セパ長計算式を追加&#10;・宿野辺橋の現場知見3件を反映"></textarea>

      <label style="font-size:12px;color:#666">統合対象工事（チェック→ integrated に移動）</label>
      <div id="smuTargets" style="max-height:120px;overflow:auto;border:1px solid #eee;padding:6px;font-size:12px"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px">
      <button class="btn btn-success" onclick="doSetupMdUpload()">アップロード</button>
    </div>
    <div id="smuStatus" style="font-size:12px;color:#666;margin-top:6px"></div>
  </div>
</div>

<table id="projTable">
  <thead>
    <tr>
      <th style="width:200px">project_id</th>
      <th style="width:180px">工事名</th>
      <th style="width:100px">状態</th>
      <th style="width:140px">工期</th>
      <th>legacy_slugs（旧形式マッピング）</th>
      <th style="width:100px">操作</th>
    </tr>
  </thead>
  <tbody id="projTbody">
    <tr><td colspan="6" class="empty">読込中...</td></tr>
  </tbody>
</table>

<script src="/index-builder.js"></script>
<script>
const STATUS_LABEL = {
  in_progress: '進行中',
  completed_pool: '完成プール',
  integrated: '統合済み',
};

function setGlobalStatus(msg, color) {
  const el = document.getElementById('globalStatus');
  el.textContent = msg;
  el.style.color = color || '#666';
}

async function loadAll() {
  setGlobalStatus('読込中...');
  const projects = await window.pmListProjects();
  const tbody = document.getElementById('projTbody');
  if (!projects.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">登録された工事はまだありません。型知トップ画面の「🏗️ 工事を登録」から登録してください。</td></tr>';
    setGlobalStatus(`0件`);
    return;
  }
  tbody.innerHTML = '';
  for (const p of projects) {
    const tr = document.createElement('tr');
    const period = (p.start_date || '-') + ' 〜 ' + (p.planned_end_date || '-');
    const slugs = (p.legacy_slugs || []).join('\n');
    tr.innerHTML = `
      <td><code>${escHtml(p.project_id)}</code></td>
      <td>${escHtml(p.project_name || '')}</td>
      <td>
        <select id="status_${escAttr(p.project_id)}">
          <option value="in_progress" ${p.status==='in_progress'?'selected':''}>進行中</option>
          <option value="completed_pool" ${p.status==='completed_pool'?'selected':''}>完成プール</option>
          <option value="integrated" ${p.status==='integrated'?'selected':''}>統合済み</option>
        </select>
      </td>
      <td>${period}</td>
      <td><textarea class="legacy-input" id="slugs_${escAttr(p.project_id)}" placeholder="1行1slug">${escHtml(slugs)}</textarea></td>
      <td>
        <button class="btn btn-warning" onclick="saveRow('${escAttr(p.project_id)}')">保存</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
  setGlobalStatus(`${projects.length}件 読込完了`, '#27ae60');
}

async function saveRow(projectId) {
  const sb = window.getSb();
  if (!sb) { setGlobalStatus('Supabase 未接続', '#c0392b'); return; }

  const status = document.getElementById('status_' + projectId).value;
  const slugsRaw = document.getElementById('slugs_' + projectId).value;
  const legacySlugs = slugsRaw.split('\n').map(s => s.trim()).filter(Boolean);

  setGlobalStatus(`${projectId} 更新中...`);
  try {
    const { error } = await sb.from('project_master')
      .update({ status, legacy_slugs: legacySlugs })
      .eq('project_id', projectId);
    if (error) throw error;
    setGlobalStatus(`✓ ${projectId} 更新完了`, '#27ae60');
  } catch (e) {
    setGlobalStatus(`❌ 更新失敗: ${e.message || e}`, '#c0392b');
  }
}

async function rebuildIndexes() {
  setGlobalStatus('INDEX 再生成中...');
  const r = await window.ibRebuildAllIndexes();
  if (r?.ok) setGlobalStatus(`✓ INDEX 再生成完了 (${r.paths.join(', ')})`, '#27ae60');
  else setGlobalStatus(`❌ ${r?.error || '失敗'}`, '#c0392b');
}

// ─── 棚卸しエクスポート ───────────────
async function openInventoryExport() {
  const projects = await window.pmListProjects();
  const completed = projects.filter(p => p.status === 'completed_pool');
  const list = document.getElementById('invList');
  if (completed.length === 0) {
    list.innerHTML = '<div style="color:#999">完成プールの工事はありません（工期完了予定日を過ぎた工事のみ対象）</div>';
  } else {
    list.innerHTML = completed.map(p => `
      <label style="display:block;padding:4px 0">
        <input type="checkbox" class="inv-cb" data-pid="${escAttr(p.project_id)}" checked>
        <code>${escHtml(p.project_id)}</code> — ${escHtml(p.project_name)}
        <span style="color:#888"> (${p.start_date || '-'} 〜 ${p.planned_end_date || '-'})</span>
      </label>
    `).join('');
  }
  document.getElementById('invModal').style.display = 'flex';
}

async function doInventoryExport() {
  const ids = [...document.querySelectorAll('.inv-cb:checked')].map(cb => cb.dataset.pid);
  if (ids.length === 0) { alert('1件以上選択してください'); return; }
  setGlobalStatus('エクスポート中...');
  const md = await window.smdBuildInventoryExport({ projectIds: ids });
  if (!md) { setGlobalStatus('❌ エクスポート失敗', '#c0392b'); return; }
  const today = new Date().toISOString().slice(0, 10);
  const blob = new Blob([md], { type: 'text/markdown; charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `inventory_export_${today}.md`;
  a.click();
  setGlobalStatus(`✓ ${ids.length}件をエクスポート`, '#27ae60');
  document.getElementById('invModal').style.display = 'none';
}

// ─── セットアップmd更新 ───────────────
async function openSetupMdUpdate() {
  const projects = await window.pmListProjects({ status: 'completed_pool' });
  const targets = document.getElementById('smuTargets');
  if (projects.length === 0) {
    targets.innerHTML = '<div style="color:#999">統合対象（completed_pool）の工事はありません。空のままアップロードもOK。</div>';
  } else {
    targets.innerHTML = projects.map(p => `
      <label style="display:block;padding:2px 0">
        <input type="checkbox" class="smu-target" data-pid="${escAttr(p.project_id)}">
        <code style="font-size:11px">${escHtml(p.project_id)}</code> — ${escHtml(p.project_name)}
      </label>
    `).join('');
  }
  document.getElementById('smuContent').value = '';
  document.getElementById('smuSummary').value = '';
  document.getElementById('smuStatus').textContent = '';
  document.getElementById('smuModal').style.display = 'flex';
}

async function doSetupMdUpload() {
  const app = document.getElementById('smuApp').value;
  const content = document.getElementById('smuContent').value.trim();
  const summary = document.getElementById('smuSummary').value.trim();
  const ids = [...document.querySelectorAll('.smu-target:checked')].map(cb => cb.dataset.pid);
  const st = document.getElementById('smuStatus');
  if (!content) { st.textContent = '⚠ md本文が空です'; st.style.color = '#c0392b'; return; }
  st.textContent = 'アップロード中...'; st.style.color = '#666';
  try {
    const rec = await window.smdUploadNewVersion({ app, mdContent: content, changeSummary: summary, integratedProjectIds: ids });
    st.innerHTML = `✓ v${rec.version_number} アップロード完了 ${ids.length > 0 ? `（${ids.length}件を integrated に移動）` : ''}`;
    st.style.color = '#27ae60';
    setTimeout(() => { document.getElementById('smuModal').style.display = 'none'; loadAll(); }, 2000);
  } catch (e) {
    st.textContent = '❌ ' + (e.message || e);
    st.style.color = '#c0392b';
  }
}

function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s) { return escHtml(s); }

// 認証完了後にロード
setTimeout(loadAll, 800);
</script>

</body>
</html>
