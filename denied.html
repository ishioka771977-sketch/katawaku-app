<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクセス権限なし — 型知</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'BIZ UDPGothic', 'Meiryo', sans-serif;
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  padding: 40px 32px;
  max-width: 400px;
  width: 100%;
  text-align: center;
}
.icon {
  width: 80px; height: 80px;
  background: #fee;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  margin-bottom: 16px;
}
h1 { font-size: 20px; color: #c0392b; margin-bottom: 12px; }
p { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 24px; }
.steps {
  background: #f8f9fa;
  border-radius: 8px;
  padding: 16px;
  text-align: left;
  font-size: 13px;
  color: #555;
  margin-bottom: 24px;
}
.steps strong { color: #1a5276; }
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: #1a5276;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: background .15s;
}
.btn:hover { background: #154360; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>ログインが必要です</h1>
    <p>型知を利用するには社員番号でログインしてください。</p>
    <a href="index.html" class="btn">ログイン画面へ</a>
  </div>
</body>
</html>
